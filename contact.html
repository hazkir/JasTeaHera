<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Learn about jasmine tea!">
    <meta name="keywords" content="jasmine tea, green tea, loose leaf jasmine tea, floral tea, scented tea, chinese jasmine tea, traditional jasmine tea">
    <meta name="author" content="Jasmine Heritage">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://hazkir.github.io/JasTeaHera/">
    <title>How to Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page">
        <h1>Contact Us</h1>
        <p class="contact-intro">
            Have a question about jasmine tea, brewing techniques, or our site?
            Send us a message and we will get back to you.
        </p>

        <!-- Success + Error Messages -->
        <div class="form-success" data-fs-success></div>
        <div class="form-error" data-fs-error></div>

        <form class="contact-form" id="contactForm" method="POST">

            <!-- Personal Info -->
            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First Name *</label>
                    <input type="text" id="first-name" name="first-name" data-fs-field required>
                    <span data-fs-error="first-name"></span>
                </div>

                <div class="form-group">
                    <label for="last-name">Last Name *</label>
                    <input type="text" id="last-name" name="last-name" data-fs-field required>
                    <span data-fs-error="last-name"></span>
                </div>
            </div>

            <!-- Contact  -->
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" data-fs-field required>
                    <span data-fs-error="email"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (optional)</label>
                    <input type="tel" id="phone" name="phone" data-fs-field>
                    <span data-fs-error="phone"></span>
                </div>
            </div>

            <!-- Selection List -->
            <div class="form-group">
                <label for="topic">What is your message about?</label>
                <select id="topic" name="topic" data-fs-field>
                    <option value="general">General Question</option>
                    <option value="tea-types">Types of Tea</option>
                    <option value="brewing">Brewing Advice</option>
                    <option value="website">Website Feedback</option>
                    <option value="other">Other</option>
                </select>
                <span data-fs-error="topic"></span>
            </div>

            <!-- Communication -->
            <div class="form-group">
                <label>Preferred Contact Method</label>
                <div class="radio-group">
                    <label><input type="radio" name="contact-method" value="email" data-fs-field checked> Email</label>
                    <label><input type="radio" name="contact-method" value="phone" data-fs-field> Phone</label>
                </div>
                <span data-fs-error="contact-method"></span>
            </div>

            <!-- Message -->
            <div class="form-group">
                <label for="message">Your Message *</label>
                <textarea id="message" name="message" rows="6" data-fs-field required></textarea>
                <span data-fs-error="message"></span>
            </div>

            <!-- Submit -->
            <button type="submit" class="tea-btn submit-btn" data-fs-submit-btn>
                Send Message
            </button>

        </form>

    </div>

    <a href="index.html" class="back-button">← Back to Home</a>
    
      <!-- Footer -->
        <footer>
            <small><i>Jasmine Heritage &copy; 2026</i></small>
        </footer>

    <!-- Formspree Initialization -->
    <script>
        window.formspree = window.formspree || function () {
            (formspree.q = formspree.q || []).push(arguments);
        };

        formspree('initForm', {
            formElement: '#contactForm',
            formId: 'mgopzqlw'
        });
    </script>

    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
    <script src="script.js"></script>

</body>
</html>
